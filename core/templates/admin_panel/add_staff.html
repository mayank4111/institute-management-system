{% extends 'admin_panel/admin_base.html' %}
{% block title %}Add Staff Member{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h4><i class="fas fa-user-plus"></i> Add Staff Member</h4>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Designation *</label>
                    <input type="text" name="designation" class="form-control" placeholder="e.g., Professor, Instructor" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Qualification *</label>
                    <input type="text" name="qualification" class="form-control" placeholder="e.g., Ph.D., M.Tech" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Experience (Years) *</label>
                    <input type="number" name="experience" class="form-control" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone *</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Bio *</label>
                    <textarea name="bio" class="form-control" rows="4" required></textarea>
                </div>
                
                <div class="col-12 mb-3">
                    <label class="form-label">Profile Photo</label>
                    <input type="file" name="photo" class="form-control" accept="image/*">
                    <small class="text-muted">Recommended size: 300x300 pixels</small>
                </div>
            </div>
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Add Staff Member
                </button>
                <a href="{% url 'manage_staff' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
